version: "3.9"

# Local development stack.
# Supabase runs on the cloud (supabase.com) — not self-hosted here.
# This compose runs: FastAPI + n8n.

services:
  # ─── FastAPI Backend ─────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: maya-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload in development
      - ../backend:/app
    env_file:
      - ../backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - maya-network

  # ─── n8n Workflow Automation ──────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.73.1
    container_name: maya-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      # Change this before using in production
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - N8N_ENCRYPTION_KEY=changeme-32-char-encryption-key!!
      - WEBHOOK_URL=http://localhost:5678
      # n8n stores workflows in this volume
      - N8N_USER_FOLDER=/home/node/.n8n
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount exported workflow JSONs so they can be imported
      - ../n8n/workflows:/workflows:ro
    networks:
      - maya-network

networks:
  maya-network:
    driver: bridge

volumes:
  n8n_data:
