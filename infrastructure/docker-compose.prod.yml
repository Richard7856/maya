version: "3.9"

# Production overrides — used with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    # Remove hot-reload source mount in production
    volumes: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maya-api.rule=Host(`api.maya.app`)"
      - "traefik.http.routers.maya-api.entrypoints=websecure"
      - "traefik.http.routers.maya-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.maya-api.loadbalancer.server.port=8000"

  n8n:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maya-n8n.rule=Host(`automation.maya.app`)"
      - "traefik.http.routers.maya-n8n.entrypoints=websecure"
      - "traefik.http.routers.maya-n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.maya-n8n.loadbalancer.server.port=5678"
    environment:
      - N8N_PROTOCOL=https
      - N8N_HOST=automation.maya.app
      - WEBHOOK_URL=https://automation.maya.app

  # ─── Traefik Reverse Proxy ────────────────────────────────────────────────
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      # Replace with your actual email for Let's Encrypt notifications
      - "--certificatesresolvers.letsencrypt.acme.email=admin@maya.app"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - maya-network

volumes:
  traefik_certs:
